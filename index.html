<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Todo App</title>
  </head>
  <body>
    <div id="main">
      <h1>Todo App</h1>
      <div>
        <input type="text" name="" id="todoInp" placeholder="Add a new todo" />

        <button onclick="delAll()" class="btn btn2">Delete All</button>
      </div>
      <ul id="todoList"></ul>
    </div>

    <script src="app.js"></script>
  </body>
</html>
